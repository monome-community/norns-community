name: norns community build & deploy

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Every night at 00:00 UTC
  schedule:
     - cron: '0 0 * * *'

  # Merges to https://github.com/monome/norns-community
  repository_dispatch:
    types:
      - trigger_build_via_norns_community_merge

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Install dependencies
        run: pip install zensical aiohttp aiofiles
      - name: "|||||||| norns community 01-curl.sh ||||||||"
        run: ./01-curl.sh
      - name: "|||||||| norns community 02-build.py ||||||||"
        run: ./02-build.py
      - name: "|||||||| norns community 03-zensical.sh ||||||||"
        run: ./03-zensical.sh
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
