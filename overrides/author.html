<!DOCTYPE html>
<html lang="en">
{% include "partials/nc_head.html" %}
<body class="{{ page.title }}">
{% include "partials/nc_nav.html" %}
<section>
<ul>
  {% for author in page.meta.authors_list %}
    <li id="{{ author.sanitized_name }}">{{ author.raw_name }}
      <ul>
        {% for project in author.projects %}
        <li><a href="{{ project.url }}">{{ project.raw_name }}</a></li>
        {% endfor %}
      </ul>
    </li>
  {% endfor %}
</ul>
</section>
{% include "partials/nc_footer.html" %}
<script src="/javascripts/script.js"></script>
</body>
</html>
